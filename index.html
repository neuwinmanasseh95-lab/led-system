<!DOCTYPE html>
<html>
<head>
  <title>LED Control</title>
</head>
<body>

<h2>ESP32 LED Control</h2>

<button onclick="send('LED1_ON')">LED1 ON</button>
<button onclick="send('LED1_OFF')">LED1 OFF</button><br><br>

<button onclick="send('LED2_ON')">LED2 ON</button>
<button onclick="send('LED2_OFF')">LED2 OFF</button><br><br>

<button onclick="send('LED3_ON')">LED3 ON</button>
<button onclick="send('LED3_OFF')">LED3 OFF</button>

<script>
function send(cmd){
  fetch(`/api/control?command=${cmd}`)
    .then(res => res.json())
    .then(data => console.log(data))
    .catch(err => console.error(err));
}
</script>

</body>
</html>
